<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교무실 호출 시스템</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Noto Sans KR', sans-serif;
  background:#f1f5f9;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  background:white;
  padding:24px;
  border-radius:16px;
  width:360px;
}

button {
  width:100%;
  padding:16px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

.student {background:#16a34a;color:white;}
.teacher {background:#1d4ed8;color:white;}
.call {background:#dc2626;color:white;font-size:20px;padding:40px;}

input, select {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.hidden {display:none;}
</style>
</head>

<body>

<!-- 선택 -->
<div id="select" class="card">
<h2>교무실 호출 시스템</h2>

<input id="topic" placeholder="채널 이름">

<button class="student" onclick="start('student')">학생 모드</button>
<button class="teacher" onclick="start('teacher')">교무실 모드</button>
</div>

<!-- 학생 -->
<div id="student" class="card hidden">

<button type="button" onclick="back()">← 뒤로</button>

<h3>선생님 선택</h3>
<select id="teacherSelect">
<option value="김철수">김철수 선생님</option>
<option value="이영희">이영희 선생님</option>
<option value="박민수">박민수 선생님</option>
</select>

<button type="button" class="call" onclick="callTeacher()">📣 호출</button>

<div id="history"></div>
</div>

<!-- 교무실 -->
<div id="teacher" class="card hidden">

<button type="button" onclick="back()">← 뒤로</button>

<h3>내 이름 입력</h3>
<input id="teacherName" placeholder="예: 김철수">

<h3>호출 목록</h3>
<div id="list"></div>

</div>

<script>
let topic = "";
let es = null;
let count = 0;

// 시작
function start(mode){
  topic = document.getElementById("topic").value;
  if(!topic){alert("채널 입력"); return;}

  document.getElementById("select").classList.add("hidden");
  document.getElementById(mode).classList.remove("hidden");

  if(mode==="teacher") connect();
}

// 뒤로
function back(){
  if(es) es.close();
  location.reload();
}

// 학생 호출 (🔥 리다이렉트 없음 + 인코딩 문제 해결)
function callTeacher(){
  const teacher = document.getElementById("teacherSelect").value;
  const time = new Date().toLocaleTimeString('ko-KR',{
    hour:'2-digit',minute:'2-digit'
  });

  const message = teacher + " 호출 (" + time + ")";

  fetch("https://ntfy.sh/"+topic,{
    method:"POST",
    body:message,
    headers:{
      "Content-Type":"text/plain"
    }
  });

  count++;
  document.getElementById("history").innerHTML =
    "호출 "+count+"회 ("+time+")";
}

// 교무실 연결
function connect(){
  es = new EventSource("https://ntfy.sh/"+topic+"/sse");

  es.onmessage = (e)=>{
    try{
      const msg = JSON.parse(e.data);
      if(msg.event !== "message") return;

      let raw = msg.message;

      // 🔥 혹시라도 message= 형태면 대비
      if(raw.startsWith("message=")){
        raw = decodeURIComponent(raw.replace("message=",""));
      }

      const my = document.getElementById("teacherName").value;

      // 내 이름 포함된 호출만 표시
      if(raw.includes(my)){
        addCall(raw);
        sound();
      }

    }catch{}
  };
}

// 호출 표시
function addCall(text){
  const el = document.createElement("div");
  el.innerHTML = "🔔 " + text;
  document.getElementById("list").prepend(el);
}

// 소리
function sound(){
  const ctx = new AudioContext();
  const o = ctx.createOscillator();
  const g = ctx.createGain();

  o.connect(g);
  g.connect(ctx.destination);

  o.frequency.value = 800;
  o.start();
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+1);
}
</script>

</body>
</html>
